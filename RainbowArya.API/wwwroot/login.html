<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARYA - Acceso Interno</title>
    <link rel="stylesheet" href="CSS/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="logo-container">
            <img src="assets/RAINBOW_ARYA_LOGO.png" alt="Logo ARYA Veterinary System" class="arya-logo"
                 onerror="this.style.display='none'">
        </div>

        <h1 class="rainbow-text">Veterinaria Rainbow Arya</h1>
        <p style="margin-bottom: 25px;">Acceso exclusivo para personal de gestión interna.</p>

        <form id="login-form">
            <div class="form-group">
                <label for="username"><i class="fas fa-envelope"></i> Correo:</label>
                <input type="text" id="username" required placeholder="correo@rainbowarya.com">
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Contraseña:</label>
                <input type="password" id="password" required placeholder="Contraseña">
            </div>

            <!-- Accesos rápidos de prueba -->
            <details style="margin-bottom:16px;font-size:12px;color:#888;cursor:pointer;">
                <summary>Cuentas de prueba</summary>
                <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px;">
                    <button type="button" class="quick-login-btn"
                        onclick="fillLogin('admin@rainbowarya.com','Admin123!')">
                        👑 Administrador
                    </button>
                    <button type="button" class="quick-login-btn"
                        onclick="fillLogin('diana.ospina@rainbowarya.com','Vet123!')">
                        🩺 Veterinario
                    </button>
                    <button type="button" class="quick-login-btn"
                        onclick="fillLogin('sofia.restrepo@rainbowarya.com','Rec123!')">
                        📋 Recepcionista
                    </button>
                    <button type="button" class="quick-login-btn"
                        onclick="fillLogin('juan.mesa@rainbowarya.com','Aux123!')">
                        🔧 Auxiliar
                    </button>
                </div>
            </details>

            <button type="submit" style="background-color: var(--arya-blue);">
                <i class="fas fa-sign-in-alt"></i> Entrar al Dashboard
            </button>
        </form>
    </div>

    <div id="notification-modal" class="modal-overlay">
        <div class="modal-content">
            <i id="modal-icon" class="icon-large fas fa-check-circle"></i>
            <h2 id="modal-title">¡Éxito!</h2>
            <p id="modal-message">Mensaje del sistema.</p>
            <button id="modal-close-btn">Aceptar</button>
        </div>
    </div>

    <style>
        .quick-login-btn {
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            text-align: left;
            transition: background 0.2s;
        }
        .quick-login-btn:hover { background: #e0e0e0; }
    </style>

    <script src="JS/api.js"></script>
    <script src="JS/login.js"></script>
    <script>
        function fillLogin(email, pass) {
            document.getElementById('username').value = email;
            document.getElementById('password').value = pass;
        }
    </script>
</body>
</html>
